<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncy Bounce - Canvas Game</title>
  <style>
    :root {
      --bg: #101722;
      --panel: #0f2034;
      --ink: #e8f2ff;
      --accent: #53d9ff;
      --danger: #ff5d5d;
      --good: #66f08d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, #1a2c43, #09101a 65%);
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }

    .shell {
      width: min(96vw, 1000px);
      border: 2px solid #2b425f;
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      background: #050a10;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      background: linear-gradient(180deg, #122741, #0d1a2e);
      border-bottom: 1px solid #2a4567;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .hud span { color: #8fd7ff; }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      background: linear-gradient(180deg, #9ad7ff 0%, #79bbf4 35%, #5aa0e1 100%);
    }

    .hint {
      padding: 8px 14px 12px;
      font-size: 0.92rem;
      color: #bfd7f4;
      background: #0c1626;
      border-top: 1px solid #253e5f;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hud">
      <div>Lives: <span id="lives">3</span></div>
      <div>Score: <span id="score">0</span></div>
      <div>Rings: <span id="rings">0</span></div>
      <div>Level: <span id="level">1</span></div>
      <div>Time: <span id="time">0</span>s</div>
    </div>
    <canvas id="game" width="960" height="540" aria-label="Bounce style game canvas"></canvas>
    <div class="hint">Controls: ← → move, ↑ jump, Enter starts/restarts, M toggles sound.</div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const ui = {
        lives: document.getElementById('lives'),
        score: document.getElementById('score'),
        rings: document.getElementById('rings'),
        level: document.getElementById('level'),
        time: document.getElementById('time')
      };

      const TAU = Math.PI * 2;
      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

      class SoundFX {
        constructor() {
          this.enabled = true;
          this.ctx = null;
        }
        ensure() {
          if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          if (this.ctx.state === 'suspended') this.ctx.resume();
        }
        tone(freq = 440, dur = 0.09, type = 'sine', gain = 0.04, slide = 1) {
          if (!this.enabled) return;
          this.ensure();
          const now = this.ctx.currentTime;
          const o = this.ctx.createOscillator();
          const g = this.ctx.createGain();
          o.type = type;
          o.frequency.setValueAtTime(freq, now);
          o.frequency.exponentialRampToValueAtTime(Math.max(40, freq * slide), now + dur);
          g.gain.setValueAtTime(gain, now);
          g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
          o.connect(g); g.connect(this.ctx.destination);
          o.start(now); o.stop(now + dur);
        }
        jump() { this.tone(560, 0.08, 'square', 0.05, 1.25); }
        collect() { this.tone(880, 0.1, 'triangle', 0.06, 1.5); }
        death() { this.tone(220, 0.25, 'sawtooth', 0.07, 0.45); }
        door() { this.tone(660, 0.2, 'triangle', 0.05, 1.8); }
      }

      class Player {
        constructor(x, y) {
          this.spawn(x, y);
          this.lives = 3;
          this.sizeState = 'normal';
          this.extraJumps = 0;
        }
        get radius() {
          return this.sizeState === 'large' ? 22 : this.sizeState === 'small' ? 11 : 16;
        }
        spawn(x, y) {
          this.x = x; this.y = y;
          this.vx = 0; this.vy = 0;
          this.onGround = false;
          this.dead = false;
          this.animPulse = 0;
          this.hitCooldown = 0;
        }
      }

      const levelData = [
        {
          name: 'Green Hills',
          timeLimit: 105,
          start: { x: 70, y: 420 },
          door: { x: 900, y: 430, w: 32, h: 64 },
          platforms: [
            { x: 0, y: 500, w: 960, h: 40 },
            { x: 120, y: 450, w: 120, h: 16 },
            { x: 290, y: 420, w: 120, h: 16 },
            { x: 470, y: 390, w: 130, h: 16 },
            { x: 670, y: 435, w: 95, h: 16 },
          ],
          slopes: [
            { x: 760, y: 500, w: 120, h: 70, dir: 'up' }
          ],
          rings: [
            { x: 160, y: 410 }, { x: 330, y: 380 }, { x: 520, y: 350 },
            { x: 710, y: 395 }, { x: 820, y: 360 }
          ],
          spikes: [{ x: 420, y: 484, w: 44, h: 16 }],
          enemies: [{ x: 610, y: 480, w: 28, h: 20, axis: 'x', min: 600, max: 760, speed: 1.6 }],
          waters: [{ x: 240, y: 500, w: 120, h: 40 }],
          powerups: [
            { x: 375, y: 390, type: 'inflate' },
            { x: 760, y: 400, type: 'life' }
          ],
          checkpoints: [{ x: 500, y: 360, active: false }]
        },
        {
          name: 'Blue Cavern',
          timeLimit: 115,
          start: { x: 50, y: 450 },
          door: { x: 900, y: 90, w: 32, h: 64 },
          platforms: [
            { x: 0, y: 500, w: 160, h: 40 },
            { x: 200, y: 460, w: 180, h: 16 },
            { x: 420, y: 420, w: 100, h: 16 },
            { x: 560, y: 360, w: 120, h: 16 },
            { x: 720, y: 300, w: 120, h: 16 },
            { x: 840, y: 240, w: 120, h: 16 },
            { x: 740, y: 160, w: 120, h: 16 },
            { x: 540, y: 120, w: 120, h: 16 },
          ],
          slopes: [
            { x: 160, y: 500, w: 80, h: 50, dir: 'up' },
            { x: 320, y: 500, w: 80, h: 80, dir: 'down' }
          ],
          rings: [
            { x: 245, y: 425 }, { x: 460, y: 385 }, { x: 610, y: 325 },
            { x: 775, y: 265 }, { x: 885, y: 205 }, { x: 798, y: 125 }, { x: 600, y: 80 }
          ],
          spikes: [
            { x: 385, y: 484, w: 32, h: 16 },
            { x: 690, y: 284, w: 32, h: 16 }
          ],
          enemies: [
            { x: 500, y: 400, w: 26, h: 18, axis: 'y', min: 240, max: 430, speed: 1.4 },
            { x: 820, y: 220, w: 26, h: 18, axis: 'x', min: 760, max: 910, speed: 2 }
          ],
          waters: [{ x: 0, y: 500, w: 120, h: 40 }, { x: 900, y: 500, w: 60, h: 40 }],
          powerups: [
            { x: 560, y: 90, type: 'shrink' },
            { x: 840, y: 130, type: 'inflate' }
          ],
          checkpoints: [{ x: 570, y: 330, active: false }]
        },
        {
          name: 'Factory Run',
          timeLimit: 130,
          start: { x: 60, y: 430 },
          door: { x: 910, y: 58, w: 32, h: 64 },
          platforms: [
            { x: 0, y: 500, w: 100, h: 40 },
            { x: 140, y: 460, w: 95, h: 16 },
            { x: 260, y: 420, w: 95, h: 16 },
            { x: 390, y: 380, w: 95, h: 16 },
            { x: 520, y: 340, w: 95, h: 16 },
            { x: 650, y: 300, w: 95, h: 16 },
            { x: 780, y: 260, w: 95, h: 16 },
            { x: 880, y: 130, w: 80, h: 16 },
            { x: 740, y: 95, w: 120, h: 16 },
            { x: 560, y: 70, w: 120, h: 16 }
          ],
          slopes: [
            { x: 100, y: 500, w: 60, h: 50, dir: 'up' },
            { x: 355, y: 500, w: 60, h: 110, dir: 'up' },
            { x: 610, y: 500, w: 60, h: 160, dir: 'down' }
          ],
          rings: [
            { x: 185, y: 425 }, { x: 305, y: 385 }, { x: 435, y: 345 }, { x: 565, y: 305 },
            { x: 695, y: 265 }, { x: 825, y: 225 }, { x: 925, y: 95 }, { x: 790, y: 60 }, { x: 620, y: 35 }
          ],
          spikes: [
            { x: 236, y: 484, w: 24, h: 16 }, { x: 490, y: 484, w: 24, h: 16 },
            { x: 746, y: 484, w: 24, h: 16 }, { x: 860, y: 244, w: 24, h: 16 }
          ],
          enemies: [
            { x: 330, y: 400, w: 24, h: 20, axis: 'x', min: 260, max: 480, speed: 2.2 },
            { x: 615, y: 320, w: 24, h: 20, axis: 'y', min: 150, max: 330, speed: 1.9 },
            { x: 800, y: 230, w: 24, h: 20, axis: 'x', min: 760, max: 930, speed: 2.6 }
          ],
          waters: [{ x: 100, y: 500, w: 40, h: 40 }, { x: 420, y: 500, w: 90, h: 40 }],
          powerups: [
            { x: 510, y: 305, type: 'shrink' },
            { x: 775, y: 65, type: 'life' }
          ],
          checkpoints: [{ x: 665, y: 270, active: false }]
        }
      ];

      const state = {
        scene: 'start',
        levelIndex: 0,
        level: null,
        score: 0,
        ringsCollected: 0,
        totalRings: 0,
        levelTime: 0,
        checkpoint: null,
        keys: { left: false, right: false, up: false },
        sound: new SoundFX(),
        tick: 0
      };

      const player = new Player(0, 0);

      function resetRun() {
        player.lives = 3;
        state.score = 0;
        state.levelIndex = 0;
        loadLevel(0);
        state.scene = 'playing';
      }

      function loadLevel(index) {
        const src = levelData[index];
        state.level = JSON.parse(JSON.stringify(src));
        state.levelTime = src.timeLimit;
        state.ringsCollected = 0;
        state.totalRings = state.level.rings.length;
        player.sizeState = 'normal';
        player.spawn(src.start.x, src.start.y);
        state.checkpoint = { x: src.start.x, y: src.start.y };
        ui.level.textContent = String(index + 1);
      }

      function circlesOverlap(ax, ay, ar, bx, by, br) {
        const dx = ax - bx, dy = ay - by;
        return (dx * dx + dy * dy) <= (ar + br) * (ar + br);
      }

      function playerRect() {
        const r = player.radius;
        return { x: player.x - r, y: player.y - r, w: r * 2, h: r * 2 };
      }

      function rectOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function killPlayer() {
        if (player.hitCooldown > 0) return;
        player.lives--;
        player.hitCooldown = 0.8;
        state.sound.death();
        if (player.lives <= 0) {
          state.scene = 'gameover';
          return;
        }
        player.spawn(state.checkpoint.x, state.checkpoint.y);
      }

      function update(dt) {
        if (state.scene !== 'playing') return;
        state.tick += dt;
        player.animPulse += dt * 8;
        if (player.hitCooldown > 0) player.hitCooldown -= dt;

        state.levelTime -= dt;
        if (state.levelTime <= 0) {
          state.levelTime = 0;
          killPlayer();
        }

        const accel = 900;
        const maxSpeed = player.sizeState === 'large' ? 220 : 280;
        const jumpV = player.sizeState === 'large' ? -420 : -450;

        if (state.keys.left) player.vx -= accel * dt;
        if (state.keys.right) player.vx += accel * dt;
        player.vx *= player.onGround ? 0.84 : 0.95;
        player.vx = clamp(player.vx, -maxSpeed, maxSpeed);

        let inWater = false;
        for (const water of state.level.waters) {
          if (rectOverlap(playerRect(), water)) {
            inWater = true;
            break;
          }
        }

        const gBase = 980;
        if (inWater) {
          if (player.sizeState === 'large') {
            player.vy += -350 * dt; // buoyant
            player.vx *= 0.92;
          } else if (player.sizeState === 'small') {
            player.vy += 1250 * dt; // sinks quickly
            player.vx *= 0.88;
          } else {
            player.vy += 800 * dt;
            player.vx *= 0.9;
          }
        } else {
          player.vy += gBase * dt;
        }

        if (state.keys.up && player.onGround) {
          player.vy = jumpV;
          player.onGround = false;
          state.sound.jump();
        }

        const prevY = player.y;
        player.x += player.vx * dt;
        player.y += player.vy * dt;
        player.onGround = false;

        const r = player.radius;
        if (player.x - r < 0) {
          player.x = r;
          player.vx = Math.abs(player.vx) * 0.35;
        }
        if (player.x + r > canvas.width) {
          player.x = canvas.width - r;
          player.vx = -Math.abs(player.vx) * 0.35;
        }

        for (const p of state.level.platforms) {
          const closestX = clamp(player.x, p.x, p.x + p.w);
          const closestY = clamp(player.y, p.y, p.y + p.h);
          const dx = player.x - closestX;
          const dy = player.y - closestY;
          if (dx * dx + dy * dy <= r * r) {
            const overlapX = r - Math.abs(dx);
            const overlapY = r - Math.abs(dy);
            if (overlapY < overlapX) {
              if (prevY + r <= p.y + 1) {
                player.y = p.y - r;
                player.vy = -Math.abs(player.vy) * 0.35;
                if (Math.abs(player.vy) < 60) player.vy = 0;
                player.onGround = true;
              } else {
                player.y = p.y + p.h + r;
                player.vy = Math.abs(player.vy) * 0.2;
              }
            } else {
              if (player.x < p.x + p.w / 2) {
                player.x = p.x - r;
                player.vx = -Math.abs(player.vx) * 0.4;
              } else {
                player.x = p.x + p.w + r;
                player.vx = Math.abs(player.vx) * 0.4;
              }
            }
          }
        }

        for (const s of state.level.slopes) {
          if (player.x + r < s.x || player.x - r > s.x + s.w) continue;
          const t = clamp((player.x - s.x) / s.w, 0, 1);
          const yTop = s.dir === 'up' ? s.y - s.h * t : s.y - s.h * (1 - t);
          if (player.y + r > yTop && player.y < s.y + 20 && player.vy >= 0) {
            player.y = yTop - r;
            player.vy = -Math.abs(player.vy) * 0.25;
            if (Math.abs(player.vy) < 50) player.vy = 0;
            player.onGround = true;
          }
        }

        if (player.y - r > canvas.height + 40) killPlayer();

        const pBox = playerRect();

        for (const cp of state.level.checkpoints) {
          if (Math.abs(player.x - cp.x) < 20 && Math.abs(player.y - cp.y) < 24) {
            cp.active = true;
            state.checkpoint = { x: cp.x, y: cp.y - 20 };
          }
        }

        for (const sp of state.level.spikes) {
          if (rectOverlap(pBox, { x: sp.x, y: sp.y, w: sp.w, h: sp.h })) {
            killPlayer();
          }
        }

        for (const e of state.level.enemies) {
          if (e.axis === 'x') {
            e.x += e.speed;
            if (e.x < e.min || e.x > e.max) e.speed *= -1;
          } else {
            e.y += e.speed;
            if (e.y < e.min || e.y > e.max) e.speed *= -1;
          }
          if (rectOverlap(pBox, e)) killPlayer();
        }

        for (const ring of state.level.rings) {
          if (ring.collected) continue;
          if (circlesOverlap(player.x, player.y, r, ring.x, ring.y, 11)) {
            ring.collected = true;
            state.ringsCollected++;
            state.score += 100;
            state.sound.collect();
          }
        }

        for (const pu of state.level.powerups) {
          if (pu.used) continue;
          if (circlesOverlap(player.x, player.y, r, pu.x, pu.y, 13)) {
            pu.used = true;
            if (pu.type === 'inflate') player.sizeState = 'large';
            if (pu.type === 'shrink') player.sizeState = 'small';
            if (pu.type === 'life') player.lives = Math.min(9, player.lives + 1);
            state.score += 50;
            state.sound.collect();
          }
        }

        const allRings = state.ringsCollected >= state.totalRings;
        const door = state.level.door;
        if (allRings && rectOverlap(pBox, door)) {
          state.sound.door();
          state.score += Math.floor(state.levelTime * 7);
          if (state.levelIndex === levelData.length - 1) {
            state.scene = 'victory';
          } else {
            state.levelIndex++;
            loadLevel(state.levelIndex);
          }
        }

        ui.lives.textContent = String(player.lives);
        ui.score.textContent = String(state.score);
        ui.rings.textContent = `${state.totalRings - state.ringsCollected}`;
        ui.time.textContent = String(Math.ceil(state.levelTime));
      }

      function drawRect(r, color) {
        ctx.fillStyle = color;
        ctx.fillRect(r.x, r.y, r.w, r.h);
      }

      function renderWorld() {
        const lvl = state.level;

        for (let i = 0; i < 7; i++) {
          ctx.fillStyle = `rgba(255,255,255,${0.02 + i * 0.01})`;
          ctx.fillRect(i * 170 - (state.tick * 12) % 170, 55 + i * 60, 120, 24);
        }

        for (const w of lvl.waters) {
          const wave = Math.sin(state.tick * 4 + w.x * 0.03) * 3;
          ctx.fillStyle = 'rgba(44, 120, 220, 0.55)';
          ctx.fillRect(w.x, w.y + wave, w.w, w.h);
          ctx.strokeStyle = 'rgba(173,220,255,0.9)';
          ctx.beginPath();
          ctx.moveTo(w.x, w.y + wave + 2);
          ctx.lineTo(w.x + w.w, w.y + wave + 2);
          ctx.stroke();
        }

        for (const p of lvl.platforms) drawRect(p, '#254f2d');

        for (const s of lvl.slopes) {
          ctx.fillStyle = '#355f34';
          ctx.beginPath();
          if (s.dir === 'up') {
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x + s.w, s.y);
            ctx.lineTo(s.x + s.w, s.y - s.h);
          } else {
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x + s.w, s.y);
            ctx.lineTo(s.x, s.y - s.h);
          }
          ctx.closePath();
          ctx.fill();
        }

        for (const cp of lvl.checkpoints) {
          ctx.fillStyle = cp.active ? '#ffeaa7' : '#d0d0d0';
          ctx.fillRect(cp.x - 3, cp.y - 44, 6, 44);
          ctx.fillStyle = cp.active ? '#ffca28' : '#9ea7b3';
          ctx.beginPath();
          ctx.moveTo(cp.x, cp.y - 44);
          ctx.lineTo(cp.x + 22, cp.y - 35);
          ctx.lineTo(cp.x, cp.y - 26);
          ctx.closePath();
          ctx.fill();
        }

        for (const sp of lvl.spikes) {
          ctx.fillStyle = '#bf2d2d';
          const teeth = Math.max(2, Math.floor(sp.w / 10));
          for (let i = 0; i < teeth; i++) {
            const x = sp.x + (sp.w / teeth) * i;
            ctx.beginPath();
            ctx.moveTo(x, sp.y + sp.h);
            ctx.lineTo(x + sp.w / teeth / 2, sp.y);
            ctx.lineTo(x + sp.w / teeth, sp.y + sp.h);
            ctx.fill();
          }
        }

        for (const e of lvl.enemies) {
          ctx.fillStyle = '#6d1548';
          ctx.fillRect(e.x, e.y, e.w, e.h);
          ctx.fillStyle = '#fff';
          ctx.fillRect(e.x + 4, e.y + 5, 4, 4);
          ctx.fillRect(e.x + e.w - 8, e.y + 5, 4, 4);
        }

        for (const ring of lvl.rings) {
          if (ring.collected) continue;
          const pulse = 1 + Math.sin(state.tick * 7 + ring.x * 0.04) * 0.15;
          ctx.strokeStyle = '#fbe35b';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, 10 * pulse, 0, TAU);
          ctx.stroke();
        }

        for (const pu of lvl.powerups) {
          if (pu.used) continue;
          const y = pu.y + Math.sin(state.tick * 4 + pu.x * 0.05) * 3;
          const colors = { inflate: '#5ac7ff', shrink: '#b985ff', life: '#6bff88' };
          ctx.fillStyle = colors[pu.type] || '#fff';
          ctx.beginPath();
          ctx.arc(pu.x, y, 10, 0, TAU);
          ctx.fill();
          ctx.fillStyle = '#001';
          ctx.font = '10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(pu.type[0].toUpperCase(), pu.x, y + 3);
        }

        const door = lvl.door;
        const open = state.ringsCollected >= state.totalRings;
        ctx.fillStyle = open ? '#68d76f' : '#784a2b';
        ctx.fillRect(door.x, door.y, door.w, door.h);
        ctx.fillStyle = '#111';
        ctx.fillRect(door.x + 8, door.y + 8, door.w - 16, door.h - 16);
      }

      function renderPlayer() {
        const r = player.radius;
        const squash = player.onGround ? 0.92 : 1.02;
        const stretch = player.onGround ? 1.06 : 0.98;
        const bob = Math.sin(player.animPulse) * 0.04;

        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.scale(stretch + bob, squash - bob);

        ctx.fillStyle = '#de2d2d';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, TAU);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-r * 0.3, -r * 0.25, Math.max(2, r * 0.12), 0, TAU);
        ctx.arc(r * 0.25, -r * 0.25, Math.max(2, r * 0.12), 0, TAU);
        ctx.fill();

        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(-r * 0.3, -r * 0.24, Math.max(1, r * 0.06), 0, TAU);
        ctx.arc(r * 0.25, -r * 0.24, Math.max(1, r * 0.06), 0, TAU);
        ctx.fill();

        ctx.restore();
      }

      function drawCenteredText(lines, sublines = []) {
        ctx.save();
        ctx.fillStyle = 'rgba(6, 12, 22, 0.78)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = 'center';
        lines.forEach((line, i) => {
          ctx.fillStyle = i === 0 ? '#e8f6ff' : '#9bd5ff';
          ctx.font = i === 0 ? 'bold 52px Trebuchet MS' : 'bold 32px Trebuchet MS';
          ctx.fillText(line, canvas.width / 2, 190 + i * 56);
        });
        sublines.forEach((line, i) => {
          ctx.fillStyle = '#dcf1ff';
          ctx.font = '22px Trebuchet MS';
          ctx.fillText(line, canvas.width / 2, 335 + i * 36);
        });
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (state.scene === 'start') {
          drawCenteredText(['Bouncy Bounce'], ['Collect all rings, unlock the door, survive!', 'Press Enter to Start']);
          return;
        }

        if (state.scene === 'gameover') {
          renderWorld();
          drawCenteredText(['Game Over'], [`Final Score: ${state.score}`, 'Press Enter to Try Again']);
          return;
        }

        if (state.scene === 'victory') {
          renderWorld();
          drawCenteredText(['You Win!'], [`Final Score: ${state.score}`, 'Press Enter to Play Again']);
          return;
        }

        renderWorld();
        renderPlayer();

        if (state.scene === 'playing') {
          const label = state.level.name;
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
          ctx.fillRect(14, 14, 220, 32);
          ctx.fillStyle = '#fff';
          ctx.font = '18px Trebuchet MS';
          ctx.textAlign = 'left';
          ctx.fillText(label, 24, 36);
        }
      }

      let last = 0;
      function gameLoop(ts) {
        const dt = clamp((ts - last) / 1000, 0, 0.032);
        last = ts;
        update(dt);
        render();
        requestAnimationFrame(gameLoop);
      }

      document.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft') state.keys.left = true;
        if (e.code === 'ArrowRight') state.keys.right = true;
        if (e.code === 'ArrowUp') state.keys.up = true;
        if (e.code === 'Enter') {
          if (state.scene === 'start' || state.scene === 'gameover' || state.scene === 'victory') resetRun();
        }
        if (e.code === 'KeyM') state.sound.enabled = !state.sound.enabled;
      });

      document.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft') state.keys.left = false;
        if (e.code === 'ArrowRight') state.keys.right = false;
        if (e.code === 'ArrowUp') state.keys.up = false;
      });

      ui.level.textContent = '1';
      ui.rings.textContent = '0';
      ui.score.textContent = '0';
      ui.time.textContent = '0';
      requestAnimationFrame(gameLoop);
    })();
  </script>
</body>
</html>
